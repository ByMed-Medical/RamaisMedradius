backend:
  name: github
  repo: byronmedeiros/diretorio-ramais          # ← MUDE PARA O SEU: usuario/repositorio
  branch: main                                  # ou master, se for o seu branch
  squash_merges: true                           # commits mais limpos

media_folder: static/images                     # opcional, para se quiser subir fotos depois
public_folder: /images

collections:
  - name: "ramais"
    label: "Ramais"
    files:
      - label: "Lista de Ramais"
        name: "ramais"
        file: "ramais.json"                     # nome exato do seu arquivo JSON
        format: "json"
        identifier_field: ramal
        fields:
          - label: "Entradas de Ramais"
            name: "ramais"
            widget: "list"
            summary: "{{fields.ramal}} - {{fields.setor}}"
            fields:
              - {label: "Ramal", name: "ramal", widget: "string", required: true}
              - {label: "Local", name: "local", widget: "string"}
              - {label: "Setor", name: "setor", widget: "string"}
              - {label: "Subsetor", name: "subsetor", widget: "string"}
              - {label: "Workstation", name: "Workstation", widget: "string"}
              - {label: "Colaborador(es)", name: "colaborador", widget: "string", hint: "Separe com / se tiver mais de um"}
