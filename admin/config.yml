backend:
  name: github
  repo: ByMed-Medical/RamaisMedradius
  branch: main
  squash_merges: true

media_folder: static/images
public_folder: /images

collections:
  - name: "ramais"
    label: "Ramais"
    files:
      - label: "Lista de Ramais"
        name: "ramais"
        file: "ramais.json"
        format: "json"
        identifier_field: ramal
        fields:
          - label: "Entradas de Ramais"
            name: "ramais"
            widget: "list"
            summary: "{{fields.ramal}} – {{fields.setor}}"
            fields:
              - {label: "Ramal", name: "ramal", widget: "string", required: true}
              - {label: "Local", name: "local", widget: "string"}
              - {label: "Setor", name: "setor", widget: "string"}
              - {label: "Subsetor", name: "subsetor", widget: "string"}
              - {label: "Workstation", name: "Workstation", widget: "string"}
              - {label: "Colaborador(es)", name: "colaborador", widget: "string", hint: "Separe com / ou ,"}
