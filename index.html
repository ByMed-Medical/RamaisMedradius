                    <i class="fa-solid fa-phone"></i> Ramais MedRadius

            </div>
        </div>

        <!-- Busca e filtro -->

                <h2 class="font-bold text-xl mb-4 flex items-center gap-2"><i class="fa-solid fa-brain text-blue-600"></i> Mapa Mental</h2>
                <div id="treeView" class="space-y-2 text-sm"></div>
            </div>

            <!-- Cards -->
            <div class="lg:col-span-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="cardsContainer"></div>
            </div>
        </div>

        <!-- Tabela (opcional) -->
        <button onclick="toggleTable()" class="mt-12 px-8 py-3 bg-blue-600 text-white rounded-2xl font-medium flex items-center gap-2 hover:bg-blue-700">
            <i class="fa-solid fa-table"></i> Ver em Tabela Completa
        </button>
        <div id="tableView" class="hidden mt-6 overflow-x-auto">

        // Render cards
        function renderCards(filtered) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'ramal-card bg-white rounded-3xl shadow p-6';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-5xl font-bold text-blue-600">${item.ramal}</div>
                            <div class="mt-1 text-gray-600">${item.setor} • ${item.subsetor || 'Geral'}</div>
                        </div>
                        <button onclick="copyRamal('${item.ramal}')" 
                                class="bg-green-100 hover:bg-green-200 text-green-700 px-5 py-2 rounded-2xl text-sm font-medium flex items-center gap-2">
                            <i class="fa-solid fa-copy"></i> Copiar
                        </button>
                    </div>
                    <div class="text-xs text-gray-400 mt-4">${item.local}</div>
                    ${item.ip ? `<div class="text-xs bg-gray-100 px-3 py-1 rounded mt-3 inline-block">Workstation: ${item.Workstation}</div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        // Árvore hierárquica (mapa mental)
        function renderTree() {
            const container = document.getElementById('treeView');
            const grouped = {};
            ramaisData.forEach(item => {
                if (!grouped[item.local]) grouped[item.local] = {};
                if (!grouped[item.local][item.setor]) grouped[item.local][item.setor] = [];
                grouped[item.local][item.setor].push(item);
            });

            Object.keys(grouped).forEach(local => {
                const details = document.createElement('details');
                details.className = 'mb-3';
                details.innerHTML = `
                    <summary class="font-semibold text-blue-600 bg-blue-50 px-4 py-2 rounded-2xl flex items-center gap-2">
                        ${local}
                    </summary>
                `;
                const inner = document.createElement('div');
                inner.className = 'pl-6 mt-2';
                Object.keys(grouped[local]).forEach(setor => {
                    const subDetails = document.createElement('details');
                    subDetails.innerHTML = `
                        <summary class="font-medium cursor-pointer py-1">${setor}</summary>
                        <div class="pl-6 text-xs space-y-1">
                            ${grouped[local][setor].map(r => `
                                <div onclick="copyRamal('${r.ramal}')" class="flex justify-between hover:bg-gray-100 p-2 rounded-xl cursor-pointer">
                                    <span>${r.ramal} - ${r.subsetor || ''}</span>
                                    ${r.Workstation ? `<span class="text-gray-400">${r.Workstation}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                    inner.appendChild(subDetails);
                });
                details.appendChild(inner);
                container.appendChild(details);
            });
        }

        function copyRamal(ramal) {
            navigator.clWorkstationboard.writeText(ramal);
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-green-600 text-white px-8 py-4 rounded-2xl shadow flex items-center gap-3';
            toast.innerHTML = `✅ Ramal <strong>${ramal}</strong> copiado!`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function toggleTable() {
            const table = document.getElementById('tableView');
            table.classList.toggle('hidden');
            if (!table.classList.contains('hidden')) {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = ramaisData.map(item => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4">${item.local}</td>
                        <td class="p-4">${item.setor}</td>
                        <td class="p-4">${item.subsetor}</td>
                        <td class="p-4 font-bold text-blue-600">${item.ramal}</td>
                        <td class="p-4">${item.Workstation}</td>
						<td class="p-4">${item.Colaborador}</td>
                    </tr>
                `).join('');
            }
        }

        // Filtros em tempo real
        function filterData() {
            const term = document.getElementById('search').value.toLowerCase();
            const localFilter = document.getElementById('localFilter').value;
            const filtered = ramaisData.filter(item => 
                (item.ramal + item.setor + item.subsetor + item.Workstation + item.local+ item.Colaborador).toLowerCase().includes(term) &&
                (!localFilter || item.local === localFilter)
            );
            renderCards(filtered);
        }

        // Inicializa
        renderCards(ramaisData);
        renderTree();
        document.getElementById('search').addEventListener('input', filterData);
        document.getElementById('localFilter').addEventListener('change', filterData);
    </script>
