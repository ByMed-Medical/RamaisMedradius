<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramais MedRadius - Diretório Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .ramal-card { 
            transition: all 0.3s; 
            font-size: 0.95rem;          /* texto um pouco menor */
        }
        .ramal-card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); 
        }
        details summary { cursor: pointer; }
        .logo-container img {
            max-height: 90px;            /* controla o tamanho da logo */
            width: auto;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-7xl mx-auto p-6 md:p-8">

        <!-- Cabeçalho com logo e texto centralizados -->
        <div class="text-center mb-8">
            <div class="flex justify-between items-center mb-8">
            <img
                    src="https://i.ibb.co/676kPzWy/logo-G.png" 
                    alt="Logo MedRadius" 
                    class="mx-auto"
                >
            </div>
            <p class="text-gray-700 font-medium text-base md:text-lg">
                Diretório dinâmico • Hospital • Clínica • Consultórios
            </p>
        </div>

        <!-- Busca e filtro -->
        <div class="flex flex-col sm:flex-row gap-3 mb-8 max-w-3xl mx-auto">
            <input 
                id="search" 
                type="text" 
                placeholder="🔎 Buscar ramal, setor ou Workstation..." 
                class="flex-1 border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
            >
            <select 
                id="localFilter" 
                class="border border-gray-300 rounded-xl px-4 py-3 bg-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 sm:w-64"
            >
                <option value="">Todos os locais</option>
                <option value="MEDRADIUS CLINICA">🏥 MEDRADIUS CLINICA</option>
                <option value="MEDRADIUS CONSULTÓRIO 1">🏥 MEDRADIUS CONSULTÓRIO 1</option>
                <option value="MEDRADIUS CONSULTÓRIO 2">🏥 MEDRADIUS CONSULTÓRIO 2</option>
				<option value="MEDRADIUS HOSPITAL">🏥 MEDRADIUS HOSPITAL</option>
				<option value="MEDRADIUS MANGABEIRAS">🏥 MEDRADIUS MANGABEIRAS</option>
            </select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Mapa Mental – mais estreito -->
            <div class="lg:col-span-3 bg-white rounded-2xl shadow p-5 h-fit">
                <h2 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-brain text-blue-600"></i> Mapa Mental
                </h2>
                <div id="treeView" class="space-y-2 text-sm"></div>
            </div>

            <!-- Cards – menores -->
            <div class="lg:col-span-9">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="cardsContainer"></div>
            </div>
        </div>

        <!-- Botão tabela (mantido igual) -->
        <button onclick="toggleTable()" class="mt-10 px-6 py-3 bg-blue-600 text-white rounded-xl font-medium flex items-center gap-2 mx-auto hover:bg-blue-700">
            <i class="fa-solid fa-table"></i> Ver em Tabela Completa
        </button>

        <div id="tableView" class="hidden mt-8 overflow-x-auto">
            <table class="w-full text-sm border-collapse">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-left">Local</th>
                        <th class="p-3 text-left">Setor</th>
                        <th class="p-3 text-left">Subsetor</th>
                        <th class="p-3 text-left">Ramal</th>
                        <th class="p-3 text-left">Workstation</th>
                        <th class="p-3 text-left">Colaborador</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="bg-white"></tbody>
            </table>
        </div>
    </div>

    // Função de render dos cards
    function renderCards(filtered) {
        const container = document.getElementById('cardsContainer');
        if (!container) return;
        container.innerHTML = '';

        if (filtered.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-8">Nenhum ramal encontrado</p>';
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'ramal-card bg-white rounded-3xl shadow p-6';
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-5xl font-bold text-blue-600">${item.ramal}</div>
                        <div class="mt-1 text-gray-600">${item.setor} • ${item.subsetor || 'Geral'}</div>
                    </div>
                    <button onclick="copyRamal('${item.ramal}')" 
                            class="bg-green-100 hover:bg-green-200 text-green-700 px-5 py-2 rounded-2xl text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-copy"></i> Copiar
                    </button>
                </div>
                <div class="text-xs text-gray-400 mt-4">${item.local}</div>
                ${item.Workstation ? `<div class="text-xs bg-gray-100 px-3 py-1 rounded mt-3 inline-block">Workstation: ${item.Workstation}</div>` : ''}
            `;
            container.appendChild(div);
        });
    }

    // Função de cópia corrigida
    function copyRamal(ramal) {
        navigator.clipboard.writeText(ramal).then(() => {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-green-600 text-white px-8 py-4 rounded-2xl shadow flex items-center gap-3 z-50';
            toast.innerHTML = `✅ Ramal <strong>${ramal}</strong> copiado!`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }).catch(() => {
            alert('Não foi possível copiar o ramal');
        });
    }

    // Mapa mental (árvore) – versão mais robusta
    function renderTree() {
        const container = document.getElementById('treeView');
        if (!container) return;
        container.innerHTML = '';

        const grouped = {};
        ramaisData.forEach(item => {
            if (!item.local) return;
            if (!grouped[item.local]) grouped[item.local] = {};
            if (!grouped[item.local][item.setor]) grouped[item.local][item.setor] = [];
            grouped[item.local][item.setor].push(item);
        });

        Object.keys(grouped).sort().forEach(local => {
            const details = document.createElement('details');
            details.className = 'mb-3';
            details.innerHTML = `<summary class="font-semibold text-blue-600 bg-blue-50 px-4 py-2 rounded-2xl flex items-center gap-2 cursor-pointer">${local}</summary>`;

            const inner = document.createElement('div');
            inner.className = 'pl-6 mt-2';

            Object.keys(grouped[local]).sort().forEach(setor => {
                const subDetails = document.createElement('details');
                subDetails.innerHTML = `<summary class="font-medium cursor-pointer py-1">${setor}</summary>`;

                const list = document.createElement('div');
                list.className = 'pl-6 text-xs space-y-1';
                grouped[local][setor].forEach(r => {
                    const row = document.createElement('div');
                    row.className = 'flex justify-between hover:bg-gray-100 p-2 rounded-xl cursor-pointer';
                    row.onclick = () => copyRamal(r.ramal);
                    row.innerHTML = `
                        <span>${r.ramal} - ${r.subsetor || ''}</span>
                        ${r.Workstation ? `<span class="text-gray-400">${r.Workstation}</span>` : ''}
                    `;
                    list.appendChild(row);
                });
                subDetails.appendChild(list);
                inner.appendChild(subDetails);
            });

            details.appendChild(inner);
            container.appendChild(details);
        });

        if (Object.keys(grouped).length === 0) {
            container.innerHTML = '<p class="text-gray-500">Nenhum dado carregado</p>';
        }
    }

    // Filtro corrigido (só busca ramal quando é número puro)
    function filterData() {
        const searchInput = document.getElementById('search');
        const localFilter = document.getElementById('localFilter');
        if (!searchInput || !localFilter) return;

        const term = searchInput.value.toLowerCase().trim();
        const localValue = localFilter.value;

        const isPureNumber = term && /^\d+$/.test(term);

        const filtered = ramaisData.filter(item => {
            if (!item) return false;

            const matches = [];

            if (item.ramal?.toLowerCase().includes(term)) matches.push(true);
            if (item.setor?.toLowerCase().includes(term)) matches.push(true);
            if (item.subsetor?.toLowerCase().includes(term)) matches.push(true);
            if (item.local?.toLowerCase().includes(term)) matches.push(true);
            if (item.colaborador?.toLowerCase().includes(term)) matches.push(true);

            // Workstation só se NÃO for busca só por número
            if (!isPureNumber && item.Workstation?.toLowerCase().includes(term)) {
                matches.push(true);
            }

            const anyMatch = matches.length > 0;

            const localOk = !localValue || item.local === localValue;

            return anyMatch && localOk;
        });

        renderCards(filtered);
    }

    // Tabela completa
    function toggleTable() {
        const tableView = document.getElementById('tableView');
        if (!tableView) return;
        tableView.classList.toggle('hidden');

        if (!tableView.classList.contains('hidden')) {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;

            tbody.innerHTML = ramaisData.map(item => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4">${item.local || ''}</td>
                    <td class="p-4">${item.setor || ''}</td>
                    <td class="p-4">${item.subsetor || ''}</td>
                    <td class="p-4 font-bold text-blue-600">${item.ramal || ''}</td>
                    <td class="p-4">${item.Workstation || ''}</td>
                    <td class="p-4">${item.colaborador || ''}</td>
                </tr>
            `).join('');
        }
    }

    // Inicialização
    try {
        renderCards(ramaisData);
        renderTree();
        
        const searchEl = document.getElementById('search');
        const filterEl = document.getElementById('localFilter');
        
        if (searchEl) searchEl.addEventListener('input', filterData);
        if (filterEl) filterEl.addEventListener('change', filterData);
    } catch (err) {
        console.error("Erro na inicialização:", err);
        document.body.insertAdjacentHTML('beforeend', '<div style="position:fixed;top:10px;right:10px;background:red;color:white;padding:10px;border-radius:8px;">Erro ao carregar página. Veja o console (F12).</div>');
    }

const ADMIN_PASSWORD_HASH = "9754e83c2c35729ae52d5de5c11d7920ad4001897d55700372315ba07a726084"; // hash de Senha@123-Med
let isAdmin = false;

// Função hash simples (SHA-256 via Web Crypto - não precisa de lib)
async function simpleHash(str) {
    const msgBuffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Botão Admin no cabeçalho (adicione isso no HTML, logo após o <p> do subtítulo)
const header = document.querySelector('.text-center.mb-8');
header.insertAdjacentHTML('beforeend', `
    <button id="adminBtn" class="mt-4 px-4 py-2 bg-purple-600 text-white rounded-xl text-sm hover:bg-purple-700">
        <i class="fa-solid fa-lock"></i> Modo Admin
    </button>
    <div id="adminArea" class="hidden mt-6 p-6 bg-white rounded-2xl shadow-lg border border-purple-200">
        <h3 class="text-lg font-bold mb-4 text-purple-700">Área Administrativa</h3>
        
        <div class="flex flex-wrap gap-4 mb-6">
            <button id="addNewBtn" class="px-4 py-2 bg-green-600 text-white rounded-xl hover:bg-green-700">
                + Novo Ramal
            </button>
            <button id="exportCsvBtn" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700">
                Exportar CSV
            </button>
            <label class="px-4 py-2 bg-orange-600 text-white rounded-xl hover:bg-orange-700 cursor-pointer">
                Importar CSV
                <input type="file" id="importCsv" accept=".csv" class="hidden">
            </label>
            <button id="saveChangesBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700">
                Salvar Alterações
            </button>
            <button id="logoutAdminBtn" class="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700">
                Sair do Admin
            </button>
        </div>

        <div id="editTable" class="overflow-x-auto max-h-96 overflow-y-auto border rounded"></div>
    </div>
`);

// Eventos
document.getElementById('adminBtn').addEventListener('click', async () => {
    if (isAdmin) {
        toggleAdminArea();
        return;
    }

    const senha = prompt("Digite a senha de administrador:");
    if (!senha) return;

    const hashInput = await simpleHash(senha);
    if (hashInput === ADMIN_PASSWORD_HASH) {
        isAdmin = true;
        alert("Modo administrador ativado!");
        toggleAdminArea();
        loadEditableTable();
    } else {
        alert("Senha incorreta.");
    }
});

function toggleAdminArea() {
    const area = document.getElementById('adminArea');
    area.classList.toggle('hidden');
    if (!area.classList.contains('hidden')) {
        loadEditableTable();
    }
}

// Carrega tabela editável
function loadEditableTable() {
    const container = document.getElementById('editTable');
    if (!container) return;

    let html = `
        <table class="w-full text-sm">
            <thead class="bg-purple-100 sticky top-0">
                <tr>
                    <th class="p-2">Local</th>
                    <th class="p-2">Setor</th>
                    <th class="p-2">Subsetor</th>
                    <th class="p-2">Ramal</th>
                    <th class="p-2">Workstation</th>
                    <th class="p-2">Colaborador</th>
                    <th class="p-2">Ações</th>
                </tr>
            </thead>
            <tbody id="editableBody">
            </tbody>
        </table>
    `;
    container.innerHTML = html;

    const tbody = document.getElementById('editableBody');
    ramaisData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'border-b hover:bg-purple-50';
        tr.innerHTML = `
            <td class="p-2"><input type="text" value="${item.local || ''}" data-index="${index}" data-field="local" class="w-full p-1 border rounded"></td>
            <td class="p-2"><input type="text" value="${item.setor || ''}" data-index="${index}" data-field="setor" class="w-full p-1 border rounded"></td>
            <td class="p-2"><input type="text" value="${item.subsetor || ''}" data-index="${index}" data-field="subsetor" class="w-full p-1 border rounded"></td>
            <td class="p-2"><input type="text" value="${item.ramal || ''}" data-index="${index}" data-field="ramal" class="w-full p-1 border rounded font-bold"></td>
            <td class="p-2"><input type="text" value="${item.Workstation || ''}" data-index="${index}" data-field="Workstation" class="w-full p-1 border rounded"></td>
            <td class="p-2"><input type="text" value="${item.colaborador || ''}" data-index="${index}" data-field="colaborador" class="w-full p-1 border rounded"></td>
            <td class="p-2"><button class="text-red-600 hover:text-red-800" onclick="deleteItem(${index})">Excluir</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// Salvar alterações nos inputs (em tempo real)
document.addEventListener('change', e => {
    if (e.target.matches('#editTable input')) {
        const index = e.target.dataset.index;
        const field = e.target.dataset.field;
        if (ramaisData[index]) {
            ramaisData[index][field] = e.target.value.trim();
        }
    }
});

// Adicionar novo
document.getElementById('addNewBtn')?.addEventListener('click', () => {
    ramaisData.push({
        local: "MEDRADIUS CLINICA",
        setor: "NOVO SETOR",
        subsetor: "",
        ramal: "999",
        Workstation: "",
        colaborador: ""
    });
    loadEditableTable();
});

// Excluir
window.deleteItem = function(index) {
    if (confirm("Excluir este ramal?")) {
        ramaisData.splice(index, 1);
        loadEditableTable();
    }
};

// Salvar no localStorage
document.getElementById('saveChangesBtn')?.addEventListener('click', () => {
    try {
        localStorage.setItem('ramaisDataCustom', JSON.stringify(ramaisData));
        alert("Alterações salvas localmente!");
        // Recarrega os dados principais
        renderCards(ramaisData);
        renderTree();
    } catch (err) {
        alert("Erro ao salvar: " + err.message);
    }
});

// Carregar do localStorage ao iniciar (se existir)
window.addEventListener('load', () => {
    const saved = localStorage.getItem('ramaisDataCustom');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                ramaisData.length = 0;
                ramaisData.push(...parsed);
                renderCards(ramaisData);
                renderTree();
                console.log("Dados customizados carregados do localStorage");
            }
        } catch (e) {}
    }
});

// Exportar CSV
document.getElementById('exportCsvBtn')?.addEventListener('click', () => {
    const headers = ["local","setor","subsetor","ramal","Workstation","colaborador"];
    const csv = [
        headers.join(','),
        ...ramaisData.map(row => 
            headers.map(h => `"${(row[h] || '').toString().replace(/"/g,'""')}"`).join(',')
        )
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'ramais_medradius_atualizado.csv';
    link.click();
    URL.revokeObjectURL(url);
});

// Importar CSV
document.getElementById('importCsv')?.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = event => {
        const text = event.target.result;
        const lines = text.split(/\r?\n/);
        const newData = [];

        // Pula cabeçalho se existir
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,'').replace(/""/g,'"'));
            if (cols.length < 4) continue;

            newData.push({
                local: cols[0] || "",
                setor: cols[1] || "",
                subsetor: cols[2] || "",
                ramal: cols[3] || "",
                Workstation: cols[4] || "",
                colaborador: cols[5] || ""
            });
        }

        if (newData.length > 0 && confirm(`Substituir tudo por ${newData.length} linhas do CSV?`)) {
            ramaisData.length = 0;
            ramaisData.push(...newData);
            loadEditableTable();
            alert("Dados importados! Clique em 'Salvar Alterações' para persistir.");
        }
    };
    reader.readAsText(file);
});

// Logout
document.getElementById('logoutAdminBtn')?.addEventListener('click', () => {
    isAdmin = false;
    document.getElementById('adminArea').classList.add('hidden');
    alert("Você saiu do modo administrador.");
});
	
</script>
</body>
</html>
